<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificador de Votación</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 400px; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; font-size: 1.2rem; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 10px; width: 90%; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #d35400; }
        #resultado { margin-top: 20px; font-size: 1.1rem; color: #34495e; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema de Verificación Electoral</h2>
    <form id="votoForm">
        <div class="campo">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Nombre de la persona" required>
        </div>
        <div class="campo">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" min="0" placeholder="Ej. 25" required>
        </div>
        <button type="submit">Verificar Requisitos</button>
    </form>

    <div id="resultado"></div>
</div>

<script>
    document.getElementById('votoForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. Obtener los valores del formulario
        const nombre = document.getElementById('nombre').value.trim();
        const edad = parseInt(document.getElementById('edad').value);
        const resultadoDiv = document.getElementById('resultado');

        // 2. Lógica de validación (mayor o igual a 18)
        if (edad >= 18) {
            resultadoDiv.innerText = `${nombre} puede votar., ya que ${nombre} tiene ${edad} años.`;
        } else {
            resultadoDiv.innerText = `${nombre} no puede votar., ya que ${nombre} tiene ${edad} años.`;
        }
    });
</script>

</body>
</html>
